<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pomodoro Timer</h1>
        </header>

        <main>
            <!-- Progress Ring -->
            <div class="timer-ring">
                <svg class="progress-ring" viewBox="0 0 200 200">
                    <circle class="ring-bg" cx="100" cy="100" r="90"/>
                    <circle class="ring-progress" cx="100" cy="100" r="90"/>
                </svg>
                <div class="timer-display">
                    <span id="time-left">25:00</span>
                </div>
            </div>

            <!-- Session Type Indicator -->
            <div class="session-type" id="session-type">
                Focus Mode
            </div>

            <!-- Session Counter -->
            <div class="session-counter">
                <span id="sessions-completed">0</span> focus sessions completed
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="start-btn" class="btn btn-primary">Start</button>
                <button id="reset-btn" class="btn btn-secondary">Reset</button>
            </div>

            <!-- Settings -->
            <div class="settings">
                <div class="setting-group">
                    <label for="focus-duration">Focus Duration:</label>
                    <input type="number" id="focus-duration" value="25" min="1" max="60">
                </div>
                <div class="setting-group">
                    <label for="short-break">Short Break:</label>
                    <input type="number" id="short-break" value="5" min="1" max="30">
                </div>
                <div class="setting-group">
                    <label for="long-break">Long Break:</label>
                    <input type="number" id="long-break" value="15" min="1" max="60">
                </div>
            </div>
        </main>

        <footer>
            <p>Built with focus in mind</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
